<!DOCTYPE html>
<html lang="zh">

<head>
    <!-- Google Tag Manager -->
    <script>(function (w, d, s, l, i) {
            w[l] = w[l] || []; w[l].push({
                'gtm.start':
                    new Date().getTime(), event: 'gtm.js'
            }); var f = d.getElementsByTagName(s)[0],
                j = d.createElement(s), dl = l != 'dataLayer' ? '&l=' + l : ''; j.async = true; j.src =
                    'https://www.googletagmanager.com/gtm.js?id=' + i + dl; f.parentNode.insertBefore(j, f);
        })(window, document, 'script', 'dataLayer', 'GTM-5W78LXJT');</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運命の織機</title>
    <link rel="stylesheet" href="css/scene.css">
    <link rel="stylesheet" href="css/eye.css">
</head>

<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5W78LXJT" height="0" width="0"
            style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <div class="main-container">

        <!-- 左侧：c (Directory) -->
        <aside class="panel directory-panel">
            <div class="sidebar-toggle-btn" onclick="toggleSidebar()">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </div>
            <div class="dir-header">
                <div class="header-box">
                    <div id="my-first-eye" class="eye-display-area">
                        <!-- 眼球组件会通过 JavaScript 插入到这里 -->
                    </div>
                    <!-- <div class="main-title">運命の織機</div>
                    <p class="sub-title">>./USER_LOGS.EXE</p> -->
                </div>
            </div>

            <!-- 分类标签 (Tabs) -->
            <div class="category-tabs" id="category-tabs">

            </div>

            <!-- 章节列表 -->
            <div class="chapter-list" id="chapter-list">

            </div>
        </aside>

        <!-- 中间：剧本主容器-->
        <main class="panel script-wrapper light-mode">
            <!-- 功能栏 -->
            <div class="script-tools-layer">
                <div class="auto-play-switch" id="auto-play-btn" onclick="VoiceManager.toggleAuto()">
                    <span>AUTO</span>
                    <div class="switch-icon">
                        <div class="switch-circle"></div>
                    </div>
                </div>
                <div class="theme-switch-group">
                    <img src="img/dh/bar_2.png" id="btn-day" class="active" onclick="setTheme('light')">
                    <img src="img/dh/bar_1.png" id="btn-night" onclick="setTheme('dark')">
                </div>
        
                <!-- ========== 阅读设置 Wrapper ========== -->
                <div class="reading-settings-wrapper">
                    <!-- Aa 按钮 -->
                    <div class="btn-reading-settings" id="btn-reading-settings">Aa</div>
        
                    <!-- 下拉面板 -->
                    <div id="reading-settings-panel" class="reading-panel" style="display: none;">
        
                        <!-- 字号 -->
                        <div class="rs-item">
                            <div class="rs-label">フォントサイズ</div>
                            <div class="rs-control-group">
                                <input type="range" id="rs-fontsize" min="0.5" max="2.0" step="0.05">
                                <span id="rs-val-fontsize" class="rs-val">0.9rem</span>
                            </div>
                        </div>
        
                        <div class="rs-item">
                            <div class="rs-label">文字の太さ</div>
                            <div class="rs-control-group">
                                <input type="range" id="rs-fontweight" min="300" max="700" step="100">
                                <span id="rs-val-fontweight" class="rs-val">400</span>
                            </div>
                        </div>
        
                        <div class="rs-item">
                            <div class="rs-label">行間</div>
                            <div class="rs-control-group">
                                <input type="range" id="rs-lineheight" min="1.0" max="3.0" step="0.1">
                                <span id="rs-val-lineheight" class="rs-val">1.8</span>
                            </div>
                        </div>
        
                        <div class="rs-item">
                            <div class="rs-label">文字間隔</div>
                            <div class="rs-control-group">
                                <input type="range" id="rs-letterspacing" min="-5" max="20" step="1">
                                <span id="rs-val-letterspacing" class="rs-val">0%</span>
                            </div>
                        </div>
        
                        <hr class="rs-divider">
        
                        <!-- 使用明体 -->
                        <div class="rs-item rs-item-toggle">
                            <div class="rs-label">明朝体</div>
                            <label class="rs-switch">
                                <input type="checkbox" id="rs-fontfamily">
                                <span class="rs-slider round"></span>
                            </label>
                        </div>
        
                        <hr class="rs-divider">
        
                        <!-- 恢复默认 -->
                        <button id="rs-reset-btn" class="rs-btn-reset">デフォルトに戻す</button>
        
                    </div>
                </div>
                <div id="float-btn-prev" class="btn-reading-settings" onclick="navigate(-1)">
                    <
                </div>
                <div id="float-btn-next" class="btn-reading-settings" onclick="navigate(1)">
                    >
                </div>
        
        
                <!-- BGM 控制 -->
                <div class="music-controls">
                    <img src="img/v2c.png" id="btn-play" class="music-icon" alt="Play" style="display: block;" onclick="toggleMusic('play')">
                    <img src="img/v2.gif" id="btn-pause" class="music-icon" alt="Pause" style="display: none;" onclick="toggleMusic('pause')">
                </div>
            </div>
        
            <!-- 剧本正文滚动区 -->
            <div class="script-scroll-area" id="script-panel">
                <div class="script-content" id="script-content">
                    <div id="chapter-title-box" class="style2-title-box">
                        <div id="chapter-title" class="style2-title"></div>
                    </div>
                    <div class="preface-box style-c" id="script-header">
                        <p class="chapter-summary" id="header-summary">WAITING FOR INPUT……</p>
                    </div>
        
                    <!-- 原本的正文部分 -->
                    <div class="loading-text">WAITING FOR INPUT……</div>
                </div>
        
                <!-- 底部占位 -->
                <div style="height: 60px;"></div>
            </div>
        
        </main>

        <!-- 右侧：信息栏 (Info) -->
        <aside class="panel info-panel">
            <!-- 1. 出场角色 -->
            <div class="info-section">
                <!-- <div class="info-title bottom2" >登場人物</div> -->
                <div id="characters-container" class="oc-window-wrapper"></div>
            </div>
            <!-- 2. 用語解説 -->
            <div class="info-section">
                <div class="info-title">用語解説</div>
                <div id="glossary-container"></div>
            </div>

            <!-- 3. あらすじ -->
            <div class="info-section">
                <div class="info-title">あらすじ</div>
                <div id="synopsis-container" class="synopsis-text"></div>
            </div>
        </aside>

    </div>


    <audio id="bgm-player" loop></audio>

    <script src="js/scene.js"></script>
    <script src="js/eye.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 获取你想要插入眼球组件的父容器
            const eyeContainer1 = document.getElementById('my-first-eye');
            if (eyeContainer1) {
                // 实例化第一个眼球组件 (使用默认的 'minimal' 极简风格)
                // 确保 parentElement 存在
                new MagneticEye(eyeContainer1, { 
                    style: 'minimal' // 明确指定为极简线框风（对应你原页面左侧的）
                });
            }

            // 你可以根据需要创建多个眼睛实例
            const eyeContainer2 = document.getElementById('my-second-eye');
            if (eyeContainer2) {
                // 实例化第二个眼球组件 (使用 'realistic' 拟物风格)
                new MagneticEye(eyeContainer2, { 
                    style: 'realistic' // 拟物写实风
                });
            }

            // 如果你想动态调整大小，可以直接修改父容器的 CSS 属性
            // 例如：
            // setTimeout(() => {
            //     if (eyeContainer1) {
            //         eyeContainer1.style.width = '300px';
            //         eyeContainer1.style.height = '150px';
            //     }
            // }, 5000);
        });
    </script>
    <script src="js/gsap.min.js"></script>
    <script src="js/ScrollToPlugin.min.js"></script>
    <script src="js/ScrollTrigger.min.js"></script>
</body>

</html>
